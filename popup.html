<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--accent:#58a6ff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);width:320px;font-family:-apple-system,sans-serif;font-size:13px;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:8px;}
.header h1{font-size:14px;font-weight:600;color:#f0f6fc;}
.content{padding:12px 16px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:8px;}
.card h2{font-size:12px;color:var(--accent);margin-bottom:6px;}
.feature{display:flex;align-items:center;gap:6px;padding:4px 0;color:var(--text-secondary);font-size:12px;}
.feature::before{content:"¹3";color:var(--accent);font-weight:bold;}
.premium{background:rgba(240,192,64,0.1);border:1px solid rgba(240,192,64,0.3);border-radius:6px;padding:10px;margin-top:8px;text-align:center;}
.premium p{font-size:12px;color:#f0c040;}
.btn{display:block;width:100%%;background:#238636;color:#fff;border:none;border-radius:6px;padding:8px;font-size:13px;cursor:pointer;margin-top:8px;font-weight:500;}
.btn:hover{background:#2ea043;}
.btn:disabled{background:#30363d;color:#8b949e;cursor:default;}
</style></head><body>
<div class="header"><span style="font-size:20px;">🔧</span><h1>Tab Suspender</h1></div>
<div class="content"><div class="card"><h2>Features</h2><div class="feature">Auto-suspend idle tabs</div><div class="feature">Whitelist important tabs</div><div class="feature">One-click restore</div><div class="feature">Memory usage display</div></div>
<div class="premium"><p>Unlock Pro &mdash; $4.99 lifetime</p>
<button class="btn" id="upgrade-btn" disabled>Coming Soon</button></div>
<div style="text-align:center;margin-top:8px;font-size:11px;color:var(--text-secondary);">Free basic use &middot; Pro unlimited</div>
</div>
